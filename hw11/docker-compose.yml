# ================================================================================
# Docker Compose для вспомогательных сервисов (ОПЦИОНАЛЬНО)
# ================================================================================
# ВНИМАНИЕ: Этот файл НЕ ОБЯЗАТЕЛЕН для работы Argo Workflows!
# 
# Основной кластер запускается через k3d командой: .\setup.ps1
# 
# Этот docker-compose.yml предоставляет вспомогательные сервисы, которые могут
# быть полезны для расширенных сценариев:
# - MinIO: S3-совместимое хранилище для артефактов
# - PostgreSQL: База данных для хранения метаданных
# - MailHog: Тестовый SMTP сервер для email уведомлений
# - Redis: Кэш и очереди
#
# Для запуска: docker-compose up -d
# Для остановки: docker-compose down
# ================================================================================

version: '3.8'

services:
  # ================================================================================
  # MinIO - S3-совместимое хранилище для артефактов
  # ================================================================================
  minio:
    image: minio/minio:latest
    container_name: argo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - argo-network
    restart: unless-stopped

  # ================================================================================
  # Mailhog - SMTP сервер для тестирования email уведомлений
  # ================================================================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: argo-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - argo-network
    restart: unless-stopped

# ================================================================================
# Volumes
# ================================================================================
volumes:
  minio_data:
    driver: local

# ================================================================================
# Networks
# ================================================================================
networks:
  argo-network:
    driver: bridge
